<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>구글애즈 계정 이관 가이드 - KTnasmedia</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://fonts.cdnfonts.com/css/google-sans" />
<style>
  :root {
    --yellow: #FBB417;
    --black: #111111;
    --white: #ffffff;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--yellow);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Segoe UI', Roboto, sans-serif;
    color: var(--black);
    min-height: 100vh;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 40px;
    position: relative;
    z-index: 10;
  }
  .nav-left, .nav-right {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .pill {
    background: #fff8e8;
    border: none;
    border-radius: 999px;
    padding: 8px 18px;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
  }
  .pill.dark {
    background: var(--black);
    color: #fff;
  }
  .logo {
    font-family: inherit;
    font-weight: 800;
    font-size: 28px;
    cursor: pointer;
    background: none;
    border: none;
    color: var(--black);
  }

  /* page sections */
  .page {
    display: none;
    max-width: 1100px;
    margin: 0 auto;
    padding: 80px 40px 100px;
    text-align: center;
    animation: fadeIn 0.35s ease;
  }
  .page.active { display: block; }

  .verify-cta {
    display: inline-block;
    margin-top: 36px;
    background: var(--black);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 16px 40px;
    font-family: inherit;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s ease;
  }
  .verify-cta:hover {
    transform: translateY(-2px);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  h1 {
    font-size: 32px;
    line-height: 1.3;
    margin-bottom: 50px;
  }
  .title-block {
    margin: 60px 0 70px;
  }
  .eyebrow {
    font-family: 'Google Sans', 'Pretendard', sans-serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(17,17,17,0.55);
    margin: 0 0 14px;
  }
  .main-title {
    font-family: 'Google Sans', 'Pretendard', sans-serif;
    font-weight: 700;
    font-size: 68px;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin: 0;
  }
  .hero-box {
    background: var(--white);
    border: 3px solid var(--black);
    border-radius: 28px;
    min-height: 380px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 30px;
    margin-bottom: 30px;
  }
  .hero-box p {
    font-size: 44px;
    line-height: 1.5;
    margin: 0;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }
  .grid button.box {
    display: block;
    width: 100%;
    background: var(--white);
    border: 3px solid var(--black);
    border-radius: 18px;
    height: 130px;
    cursor: pointer;
    font-family: inherit;
    font-size: 16px;
    transition: transform 0.15s ease;
  }
  .grid button.box:hover {
    transform: translateY(-4px);
  }
  .grid button.box.locked {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .grid button.box.locked:hover {
    transform: none;
  }
  @keyframes shake {
    10%, 90% { transform: translateX(-2px); }
    20%, 80% { transform: translateX(4px); }
    30%, 50%, 70% { transform: translateX(-8px); }
    40%, 60% { transform: translateX(8px); }
  }
  .grid button.box.shake {
    animation: shake 0.5s ease;
  }
  .lock-note {
    font-size: 14px;
    color: rgba(17,17,17,0.6);
    margin: 14px 0 0;
  }

  /* sub pages (coming soon) */
  .sub-hero {
    background: var(--white);
    border: 3px solid var(--black);
    border-radius: 28px;
    min-height: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 30px;
  }
  .sub-hero p {
    font-size: 48px;
    line-height: 1.4;
    margin: 0 0 24px;
    font-weight: bold;
  }
  .sub-hero span {
    font-size: 18px;
    color: #555;
  }
  .back {
    display: inline-block;
    margin-top: 30px;
    text-decoration: none;
    color: var(--black);
    background: var(--white);
    border: 3px solid var(--black);
    border-radius: 999px;
    padding: 10px 24px;
    font-family: inherit;
    font-size: 15px;
    cursor: pointer;
  }

  .site-logo {
    position: fixed;
    top: 24px;
    left: 40px;
    height: 28px;
    z-index: 20;
  }

  .user-badge {
    position: fixed;
    top: 22px;
    right: 40px;
    z-index: 20;
    display: none;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.85);
    border: 2px solid var(--black);
    border-radius: 999px;
    padding: 8px 10px 8px 16px;
    font-size: 13px;
  }
  .user-badge .user-email {
    font-weight: 600;
    max-width: 220px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .user-badge .user-remain {
    color: rgba(17,17,17,0.55);
    font-size: 12px;
    white-space: nowrap;
  }
  .user-badge button {
    background: var(--black);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 6px 14px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
  }

  @media (max-width: 800px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
    .hero-box p { font-size: 30px; }
    .main-title { font-size: 40px; }
    .title-block { margin: 40px 0 50px; }
    header { flex-wrap: wrap; gap: 12px; }
    .site-logo { left: 20px; top: 18px; height: 22px; }
    .user-badge { right: 16px; top: 16px; padding: 6px 8px 6px 12px; }
    .user-badge .user-remain { display: none; }
    .user-badge .user-email { max-width: 120px; font-size: 12px; }
  }
</style>
</head>
<body>

<img src="kt_nasmedia.png" alt="KT nasmedia" class="site-logo">

<div class="user-badge" id="user-badge">
  <span class="user-email" id="user-email"></span>
  <span class="user-remain" id="user-remain"></span>
  <button onclick="logout()">로그아웃</button>
</div>

<!-- HOME -->
<section class="page active" id="home">
  <div class="title-block">
    <p class="eyebrow">Guidance</p>
    <h1 class="main-title">Google Account<br>transfer</h1>
  </div>

  <div class="grid" id="box-grid">
    <button class="box" onclick="goToGuide('box1', this)"></button>
    <button class="box" onclick="goToGuide('box2', this)"></button>
    <button class="box" onclick="goToGuide('box3', this)"></button>
    <button class="box" onclick="goToGuide('box4', this)"></button>
  </div>
  <p class="lock-note" id="lock-note">🔒 가이드를 보려면 먼저 임직원 인증이 필요합니다.</p>

  <button class="verify-cta" onclick="goTo('verify')">임직원 인증</button>
</section>

<!-- SUB PAGES (coming soon) -->
<section class="page" id="box1">
  <div class="sub-hero">
    <p>Coming Soon</p>
    <span>준비 중인 페이지입니다. (1)</span>
  </div>
  <button class="back" onclick="goTo('home')">← 메인으로 돌아가기</button>
</section>

<section class="page" id="box2">
  <div class="sub-hero">
    <p>Coming Soon</p>
    <span>준비 중인 페이지입니다. (2)</span>
  </div>
  <button class="back" onclick="goTo('home')">← 메인으로 돌아가기</button>
</section>

<section class="page" id="box3">
  <div class="sub-hero">
    <p>Coming Soon</p>
    <span>준비 중인 페이지입니다. (3)</span>
  </div>
  <button class="back" onclick="goTo('home')">← 메인으로 돌아가기</button>
</section>

<section class="page" id="box4">
  <div class="sub-hero">
    <p>Coming Soon</p>
    <span>준비 중인 페이지입니다. (4)</span>
  </div>
  <button class="back" onclick="goTo('home')">← 메인으로 돌아가기</button>
</section>

<section class="page" id="verify">
  <div class="sub-hero" style="min-height:auto; padding:50px 30px;">
    <p style="font-size:32px;">임직원 인증</p>
    <span style="margin-bottom:20px;">나스미디어 임직원만 입장 가능합니다. (@nasmedia.co.kr)</span>

    <div id="verify-step1" style="width:100%; max-width:380px;">
      <input type="email" id="verify-email" placeholder="xxxx@nasmedia.co.kr"
        style="width:100%; padding:14px 16px; border:2px solid var(--black); border-radius:12px; font-family:inherit; font-size:15px; margin-bottom:14px;">
      <button class="back" style="width:100%; margin-top:0;" onclick="sendCode()">인증 신청</button>
      <p id="verify-error" style="font-size:14px; margin-top:10px; display:none;"></p>
    </div>

    <div id="verify-pending" style="width:100%; max-width:380px; display:none;">
      <p style="font-size:24px; margin:0 0 8px;">⏳ 승인 대기중</p>
      <span id="verify-pending-email" style="display:block; margin-bottom:18px; word-break:break-all;"></span>
      <button class="back" style="width:100%; margin-top:0;" onclick="checkStatus()">상태 확인하기</button>
      <p id="verify-pending-error" style="font-size:14px; margin-top:10px; display:none;"></p>
    </div>

    <div id="verify-success" style="display:none;">
      <p style="font-size:28px;">✅ 인증 완료</p>
      <span>임직원 인증이 완료되었습니다. 가이드를 이용하실 수 있습니다.</span>
    </div>
  </div>
  <button class="back" onclick="goTo('home')">← 메인으로 돌아가기</button>
</section>

<script>
  function goTo(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const target = document.getElementById(id);
    if (target) target.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    history.replaceState(null, '', '#' + id);
  }

  // ---- 인증 상태 확인 / 박스 잠금 처리 ----
  // localStorage에 이메일 + 인증 시각을 저장해서, 7일간 재인증 없이 유지되도록 함
  const VERIFIED_KEY = 'nasmedia_verified_session';
  const VERIFIED_TTL_MS = 7 * 24 * 60 * 60 * 1000; // 7일

  function getVerifiedSession() {
    const raw = localStorage.getItem(VERIFIED_KEY);
    if (!raw) return null;
    try {
      const parsed = JSON.parse(raw);
      if (!parsed.email || !parsed.ts) return null;
      if (Date.now() - parsed.ts > VERIFIED_TTL_MS) {
        localStorage.removeItem(VERIFIED_KEY);
        return null;
      }
      return parsed;
    } catch (e) {
      localStorage.removeItem(VERIFIED_KEY);
      return null;
    }
  }

  function isVerified() {
    return !!getVerifiedSession();
  }

  function setVerified(email) {
    localStorage.setItem(VERIFIED_KEY, JSON.stringify({ email: email, ts: Date.now() }));
    updateLockUI();
  }

  function logout() {
    localStorage.removeItem(VERIFIED_KEY);
    updateLockUI();
    goTo('home');
  }

  function formatRemaining(session) {
    const remainMs = VERIFIED_TTL_MS - (Date.now() - session.ts);
    if (remainMs <= 0) return '곧 만료';
    const totalMinutes = Math.floor(remainMs / 60000);
    const days = Math.floor(totalMinutes / (60 * 24));
    const hours = Math.floor((totalMinutes % (60 * 24)) / 60);
    if (days > 0) return `${days}일 ${hours}시간 남음`;
    const minutes = totalMinutes % 60;
    if (hours > 0) return `${hours}시간 ${minutes}분 남음`;
    return `${minutes}분 남음`;
  }

  function updateLockUI() {
    const session = getVerifiedSession();
    const verified = !!session;

    document.querySelectorAll('#box-grid .box').forEach(btn => {
      btn.classList.toggle('locked', !verified);
    });
    const note = document.getElementById('lock-note');
    if (note) note.style.display = verified ? 'none' : 'block';

    const badge = document.getElementById('user-badge');
    const emailEl = document.getElementById('user-email');
    const remainEl = document.getElementById('user-remain');
    if (badge && emailEl) {
      if (verified) {
        emailEl.textContent = session.email;
        if (remainEl) remainEl.textContent = formatRemaining(session);
        badge.style.display = 'flex';
      } else {
        badge.style.display = 'none';
      }
    }
  }

  function goToGuide(id, btn) {
    if (!isVerified()) {
      if (btn) {
        btn.classList.remove('shake');
        // 리플로우를 강제해서 같은 박스를 연속 클릭해도 애니메이션이 다시 재생되게 함
        void btn.offsetWidth;
        btn.classList.add('shake');
      }
      return;
    }
    goTo(id);
  }

  // ---- 임직원 인증 (Vercel 서버리스 함수 경유, CORS 문제 없음) ----
  const VERIFY_API_URL = '/api/verify';
  let submittedEmail = '';

  async function sendCode() {
    const email = document.getElementById('verify-email').value.trim();
    const errorEl = document.getElementById('verify-error');
    const button = document.querySelector('#verify-step1 button.back');

    const isValid = /^[a-zA-Z0-9._%+-]+@nasmedia\.co\.kr$/i.test(email);
    if (!isValid) {
      errorEl.style.color = '#c0392b';
      errorEl.textContent = '@nasmedia.co.kr 메일 주소만 사용 가능합니다.';
      errorEl.style.display = 'block';
      return;
    }
    errorEl.style.display = 'none';
    button.textContent = '확인 중...';
    button.disabled = true;

    submittedEmail = email;
    const result = await callVerifyApi(email);

    if (result.ok) {
      if (result.data.status === 'approved') {
        showApproved();
      } else if (result.data.status === 'pending') {
        showPending(email);
      } else {
        errorEl.style.color = '#c0392b';
        errorEl.textContent = '확인 중 오류가 발생했습니다. 다시 시도해주세요.';
        errorEl.style.display = 'block';
      }
    } else {
      errorEl.style.color = '#c0392b';
      errorEl.textContent = result.message;
      errorEl.style.display = 'block';
    }

    button.textContent = '인증 신청';
    button.disabled = false;
  }

  async function checkStatus() {
    const button = document.querySelector('#verify-pending button.back');
    const errorEl = document.getElementById('verify-pending-error');
    errorEl.style.display = 'none';
    button.textContent = '확인 중...';
    button.disabled = true;

    const result = await callVerifyApi(submittedEmail);

    if (result.ok) {
      if (result.data.status === 'approved') {
        showApproved();
      } else if (result.data.status === 'pending') {
        errorEl.style.color = '#1a7f37';
        errorEl.textContent = '아직 승인 대기중입니다. 담당자 승인 후 다시 확인해주세요.';
        errorEl.style.display = 'block';
      } else {
        errorEl.style.color = '#c0392b';
        errorEl.textContent = '확인 중 오류가 발생했습니다. 다시 시도해주세요.';
        errorEl.style.display = 'block';
      }
    } else {
      errorEl.style.color = '#c0392b';
      errorEl.textContent = result.message;
      errorEl.style.display = 'block';
    }

    button.textContent = '상태 확인하기';
    button.disabled = false;
  }

  async function callVerifyApi(email) {
    try {
      const res = await fetch(`${VERIFY_API_URL}?email=${encodeURIComponent(email)}`);
      const data = await res.json();
      if (data.status === 'error') {
        return {
          ok: false,
          message: '서버 오류: ' + (data.message || '알 수 없는 오류') + (data.error_detail ? ' / ' + data.error_detail : '') + (data.upstream_body_preview ? ' / ' + data.upstream_body_preview : '')
        };
      }
      return { ok: true, data };
    } catch (err) {
      return { ok: false, message: '서버에 연결할 수 없습니다. 잠시 후 다시 시도해주세요.' };
    }
  }

  function showPending(email) {
    document.getElementById('verify-step1').style.display = 'none';
    document.getElementById('verify-success').style.display = 'none';
    document.getElementById('verify-pending').style.display = 'block';
    document.getElementById('verify-pending-email').textContent = email;
  }

  function showApproved() {
    document.getElementById('verify-step1').style.display = 'none';
    document.getElementById('verify-pending').style.display = 'none';
    document.getElementById('verify-success').style.display = 'block';
    setVerified(submittedEmail);
  }

  // support direct hash load / back-forward
  window.addEventListener('DOMContentLoaded', () => {
    updateLockUI();
    setInterval(updateLockUI, 60 * 1000); // 1분마다 남은 시간 갱신
    const hash = window.location.hash.replace('#', '');
    if (hash && document.getElementById(hash)) {
      goTo(hash);
    }
  });
</script>

</body>
</html>
