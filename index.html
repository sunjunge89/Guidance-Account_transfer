<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>구글애즈 계정 이관 가이드 - KTnasmedia</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://fonts.cdnfonts.com/css/google-sans" />
<style>
  :root {
    --bg: #F1F3F4;
    --black: #111111;
    --white: #ffffff;
    --g-blue:   #4285F4;
    --g-red:    #EA4335;
    --g-yellow: #FBBC05;
    --g-green:  #34A853;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
    color: var(--black);
    min-height: 100vh;
  }

  /* ── 페이지 공통 ── */
  .page {
    display: none;
    max-width: 1400px;
    margin: 0 auto;
    padding: 80px 40px 100px;
    text-align: center;
    animation: fadeIn 0.35s ease;
  }
  .page.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(2px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── 메인 타이틀 ── */
  .title-block { margin: 60px 0 60px; }
  .eyebrow {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(17,17,17,0.4);
    margin: 0 0 12px;
  }
  .main-title {
    font-family: 'Google Sans', 'Pretendard', sans-serif;
    font-weight: 700;
    font-size: 64px;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin: 0;
    color: var(--black);
  }

  /* ── 박스 그리드 ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  .grid button.box {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: space-between;
    width: 100%;
    border: none;
    border-radius: 20px;
    height: 200px;
    cursor: pointer;
    font-family: 'Pretendard', -apple-system, sans-serif;
    padding: 26px 24px;
    text-align: left;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    box-shadow: 0 4px 16px rgba(0,0,0,0.10);
  }
  .box-1 { background: var(--g-blue); }
  .box-2 { background: var(--g-red); }
  .box-3 { background: var(--g-yellow); }
  .box-4 { background: var(--g-green); }

  .grid button.box:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 28px rgba(0,0,0,0.16);
  }
  .grid button.box.locked {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .grid button.box.locked:hover {
    transform: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.10);
  }
  @keyframes shake {
    20%, 80% { transform: translateX(-3px); }
    40%, 60% { transform: translateX(3px); }
  }
  .grid button.box.shake { animation: shake 0.4s ease; }

  .box-step {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: rgba(0,0,0,0.28);
  }
  .box-title {
    display: block;
    font-size: 26px;
    font-weight: 800;
    color: var(--black);
    line-height: 1.2;
    letter-spacing: -0.5px;
  }
  .box-desc {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: rgba(0,0,0,0.55);
    line-height: 1.5;
  }
  .box-single { justify-content: space-between; }

  .lock-note {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin: 18px 0 0;
    padding: 10px 20px;
    background: rgba(0,0,0,0.06);
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    color: rgba(17,17,17,0.7);
  }

  /* ── 임직원 인증 버튼 ── */
  .verify-cta {
    display: inline-block;
    margin-top: 36px;
    background: var(--black);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 16px 40px;
    font-family: inherit;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s ease;
  }
  .verify-cta:hover { transform: translateY(-2px); }

  .inline-verify {
    display: none;
    margin-top: 20px;
    animation: fadeIn 0.25s ease;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
  }
  .inline-verify input[type="email"] {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid rgba(0,0,0,0.15);
    border-radius: 12px;
    font-family: inherit;
    font-size: 15px;
    outline: none;
    background: #fff;
    margin-bottom: 10px;
    transition: border-color 0.15s;
  }
  .inline-verify input[type="email"]:focus {
    border-color: #4285F4;
  }
  .inline-submit {
    width: 100%;
    background: var(--black);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .inline-submit:hover { opacity: 0.85; }
  .inline-msg {
    font-size: 13px;
    margin-top: 10px;
    min-height: 18px;
    color: rgba(17,17,17,0.6);
  }

  /* ── 서브 페이지 ── */
  .sub-hero {
    background: var(--white);
    border-radius: 28px;
    min-height: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 30px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  }
  .sub-hero p {
    font-size: 48px;
    line-height: 1.4;
    margin: 0 0 24px;
    font-weight: bold;
  }
  .sub-hero span { font-size: 18px; color: #555; }
  .back {
    display: inline-block;
    margin-top: 30px;
    text-decoration: none;
    color: var(--black);
    background: var(--white);
    border: 2px solid var(--black);
    border-radius: 999px;
    padding: 10px 24px;
    font-family: inherit;
    font-size: 15px;
    cursor: pointer;
  }

  /* ── 고정 요소 ── */
  .site-logo {
    position: fixed;
    top: 24px;
    left: 40px;
    height: 28px;
    z-index: 20;
  }
  .user-badge {
    position: fixed;
    top: 22px;
    right: 40px;
    z-index: 20;
    display: none;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.92);
    border: 1.5px solid rgba(0,0,0,0.12);
    border-radius: 999px;
    padding: 8px 10px 8px 16px;
    font-size: 13px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .user-badge .user-email {
    font-weight: 600;
    max-width: 220px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .user-badge .user-remain {
    color: rgba(17,17,17,0.5);
    font-size: 12px;
    white-space: nowrap;
  }
  .user-badge button {
    background: var(--black);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 6px 14px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
  }

  /* ── 반응형 ── */
  @media (max-width: 800px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
    .main-title { font-size: 40px; }
    .title-block { margin: 40px 0 40px; }
    .site-logo { left: 20px; top: 18px; height: 22px; }
    .user-badge { right: 16px; top: 16px; padding: 6px 8px 6px 12px; }
    .user-badge .user-remain { display: none; }
    .user-badge .user-email { max-width: 120px; font-size: 12px; }
  }
</style>
</head>
<body>

<img src="kt_nasmedia.png" alt="KT nasmedia" class="site-logo">

<div class="user-badge" id="user-badge">
  <span class="user-email" id="user-email"></span>
  <span class="user-remain" id="user-remain"></span>
  <button onclick="logout()">로그아웃</button>
</div>

<!-- HOME -->
<section class="page active" id="home">
  <div class="title-block">
    <p class="eyebrow">Guidance</p>
    <h1 class="main-title">Google Ads<br>Account Transfer</h1>
  </div>

  <div class="grid" id="box-grid">
    <button class="box box-1 box-single" onclick="goToGuide('account-mapping', this)">
      <span class="box-step">01</span>
      <span class="box-title">계정 맵핑</span>
      <span class="box-desc">이관 대상 계정 구조 파악 및 정리</span>
    </button>
    <button class="box box-2" onclick="goToGuide('direct-advertiser', this)">
      <span class="box-step">02</span>
      <span class="box-title">직광고주 이관</span>
      <span class="box-desc">광고주 직접결제 → 나스 인보이스 전환</span>
    </button>
    <button class="box box-3" onclick="goToGuide('agency-transfer', this)">
      <span class="box-step">03</span>
      <span class="box-title">대행사&amp;렙 이관</span>
      <span class="box-desc">타사 인보이스 → 나스 인보이스 전환</span>
    </button>
    <button class="box box-4" onclick="goToGuide('reverse-transfer', this)">
      <span class="box-step">04</span>
      <span class="box-title">피이관</span>
      <span class="box-desc">나스 인보이스 → 타사 직접결제 전환</span>
    </button>
  </div>
  <p class="lock-note" id="lock-note">🔒 가이드를 보려면 먼저 임직원 인증이 필요합니다.</p>

  <button class="verify-cta" id="verify-cta" onclick="toggleInlineVerify()">임직원 인증</button>

  <div class="inline-verify" id="inline-verify">
    <input type="email" id="inline-email" placeholder="xxxx@nasmedia.co.kr" autocomplete="email">
    <button class="inline-submit" id="inline-submit" onclick="sendCode()">신청하기</button>
    <p class="inline-msg" id="inline-msg"></p>
  </div>

  <p class="lock-note" id="inline-success" style="display:none;">🖤 임직원 인증이 완료되었습니다.</p>
</section>

<!-- SUB PAGES (coming soon) -->
<section class="page" id="account-mapping">
  <div class="sub-hero">
    <p>Coming Soon</p>
    <span>준비 중인 페이지입니다. (1)</span>
  </div>
  <button class="back" onclick="goTo('home')">← 메인으로 돌아가기</button>
</section>

<section class="page" id="direct-advertiser">
  <div class="sub-hero">
    <p>Coming Soon</p>
    <span>준비 중인 페이지입니다. (2)</span>
  </div>
  <button class="back" onclick="goTo('home')">← 메인으로 돌아가기</button>
</section>

<section class="page" id="agency-transfer">
  <div class="sub-hero">
    <p>Coming Soon</p>
    <span>준비 중인 페이지입니다. (3)</span>
  </div>
  <button class="back" onclick="goTo('home')">← 메인으로 돌아가기</button>
</section>

<section class="page" id="reverse-transfer">
  <div class="sub-hero">
    <p>Coming Soon</p>
    <span>준비 중인 페이지입니다. (4)</span>
  </div>
  <button class="back" onclick="goTo('home')">← 메인으로 돌아가기</button>
</section>

<script>
  function goTo(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const target = document.getElementById(id);
    if (target) target.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    history.replaceState(null, '', '#' + id);
  }

  // ---- 인증 상태 확인 / 박스 잠금 처리 ----
  // localStorage에 이메일 + 인증 시각을 저장해서, 7일간 재인증 없이 유지되도록 함
  const VERIFIED_KEY = 'nasmedia_verified_session';
  const VERIFIED_TTL_MS = 7 * 24 * 60 * 60 * 1000; // 7일

  function getVerifiedSession() {
    const raw = localStorage.getItem(VERIFIED_KEY);
    if (!raw) return null;
    try {
      const parsed = JSON.parse(raw);
      if (!parsed.email || !parsed.ts) return null;
      if (Date.now() - parsed.ts > VERIFIED_TTL_MS) {
        localStorage.removeItem(VERIFIED_KEY);
        return null;
      }
      return parsed;
    } catch (e) {
      localStorage.removeItem(VERIFIED_KEY);
      return null;
    }
  }

  function isVerified() {
    return !!getVerifiedSession();
  }

  function setVerified(email) {
    localStorage.setItem(VERIFIED_KEY, JSON.stringify({ email: email, ts: Date.now() }));
    updateLockUI();
  }

  function logout() {
    localStorage.removeItem(VERIFIED_KEY);
    updateLockUI();
    goTo('home');
  }

  function formatRemaining(session) {
    const remainMs = VERIFIED_TTL_MS - (Date.now() - session.ts);
    if (remainMs <= 0) return '곧 만료';
    const totalMinutes = Math.floor(remainMs / 60000);
    const days = Math.floor(totalMinutes / (60 * 24));
    const hours = Math.floor((totalMinutes % (60 * 24)) / 60);
    if (days > 0) return `${days}일 ${hours}시간 남음`;
    const minutes = totalMinutes % 60;
    if (hours > 0) return `${hours}시간 ${minutes}분 남음`;
    return `${minutes}분 남음`;
  }

  function updateLockUI() {
    const session = getVerifiedSession();
    const verified = !!session;

    document.querySelectorAll('#box-grid .box').forEach(btn => {
      btn.classList.toggle('locked', !verified);
    });
    const note = document.getElementById('lock-note');
    if (note) note.style.display = verified ? 'none' : 'block';

    const verifyCta = document.getElementById('verify-cta');
    if (verifyCta) verifyCta.style.display = verified ? 'none' : 'inline-block';

    const successMsg = document.getElementById('inline-success');
    if (successMsg) successMsg.style.display = verified ? 'inline-flex' : 'none';

    const badge = document.getElementById('user-badge');
    const emailEl = document.getElementById('user-email');
    const remainEl = document.getElementById('user-remain');
    if (badge && emailEl) {
      if (verified) {
        emailEl.textContent = session.email;
        if (remainEl) remainEl.textContent = formatRemaining(session);
        badge.style.display = 'flex';
      } else {
        badge.style.display = 'none';
      }
    }
  }

  function goToGuide(id, btn) {
    if (!isVerified()) {
      if (btn) {
        btn.classList.remove('shake');
        // 리플로우를 강제해서 같은 박스를 연속 클릭해도 애니메이션이 다시 재생되게 함
        void btn.offsetWidth;
        btn.classList.add('shake');
      }
      return;
    }
    goTo(id);
  }

  // ---- 임직원 인증 (인라인 방식) ----
  const VERIFY_API_URL = '/api/verify';
  let submittedEmail = '';

  function toggleInlineVerify() {
    const form = document.getElementById('inline-verify');
    const isVisible = form.style.display === 'block';
    form.style.display = isVisible ? 'none' : 'block';
    if (!isVisible) {
      document.getElementById('inline-email').focus();
    }
  }

  async function sendCode() {
    const email = document.getElementById('inline-email').value.trim();
    const msgEl = document.getElementById('inline-msg');
    const btn = document.getElementById('inline-submit');

    const isValid = /^[a-zA-Z0-9._%+-]+@nasmedia\.co\.kr$/i.test(email);
    if (!isValid) {
      msgEl.style.color = '#c0392b';
      msgEl.textContent = '@nasmedia.co.kr 메일 주소만 사용 가능합니다.';
      return;
    }

    msgEl.textContent = '';
    btn.textContent = '확인 중...';
    btn.disabled = true;
    submittedEmail = email;

    const result = await callVerifyApi(email);

    if (result.ok) {
      if (result.data.status === 'approved') {
        showApproved();
      } else if (result.data.status === 'pending') {
        // 대기 중 → 상태 확인 버튼으로 전환
        btn.textContent = '상태 확인하기';
        btn.disabled = false;
        btn.onclick = checkStatus;
        msgEl.style.color = 'rgba(17,17,17,0.65)';
        msgEl.textContent = '신청이 접수되었습니다. 담당자 승인 후 아래 버튼으로 확인해주세요.';
      } else {
        msgEl.style.color = '#c0392b';
        msgEl.textContent = '오류가 발생했습니다. 다시 시도해주세요.';
        btn.textContent = '신청하기';
        btn.disabled = false;
      }
    } else {
      msgEl.style.color = '#c0392b';
      msgEl.textContent = result.message;
      btn.textContent = '신청하기';
      btn.disabled = false;
    }
  }

  async function checkStatus() {
    const msgEl = document.getElementById('inline-msg');
    const btn = document.getElementById('inline-submit');
    btn.textContent = '확인 중...';
    btn.disabled = true;

    const result = await callVerifyApi(submittedEmail);

    if (result.ok) {
      if (result.data.status === 'approved') {
        showApproved();
      } else {
        msgEl.style.color = 'rgba(17,17,17,0.65)';
        msgEl.textContent = '아직 대기중입니다. 잠시 후 다시 확인해주세요.';
        btn.textContent = '상태 확인하기';
        btn.disabled = false;
      }
    } else {
      msgEl.style.color = '#c0392b';
      msgEl.textContent = result.message;
      btn.textContent = '상태 확인하기';
      btn.disabled = false;
    }
  }

  async function callVerifyApi(email) {
    try {
      const res = await fetch(`${VERIFY_API_URL}?email=${encodeURIComponent(email)}`);
      const data = await res.json();
      if (data.status === 'error') {
        return { ok: false, message: '서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.' };
      }
      return { ok: true, data };
    } catch (err) {
      return { ok: false, message: '서버에 연결할 수 없습니다. 잠시 후 다시 시도해주세요.' };
    }
  }

  function showApproved() {
    document.getElementById('inline-verify').style.display = 'none';
    document.getElementById('inline-success').style.display = 'inline-flex';
    setVerified(submittedEmail);
  }

  // support direct hash load / back-forward
  window.addEventListener('DOMContentLoaded', () => {
    updateLockUI();
    setInterval(updateLockUI, 60 * 1000); // 1분마다 남은 시간 갱신

    revalidateWithServer(); // 페이지 진입 시 서버 승인 상태 재확인
    setInterval(revalidateWithServer, 5 * 60 * 1000); // 5분마다 서버 승인 상태 재확인 (승인 취소 즉시 반영)

    const hash = window.location.hash.replace('#', '');
    if (hash && document.getElementById(hash)) {
      goTo(hash);
    }
  });

  // 로컬에 인증 캐시가 남아있어도, 서버(시트)에서 승인이 취소됐으면 즉시 로그아웃 처리
  async function revalidateWithServer() {
    const session = getVerifiedSession();
    if (!session) return;

    const result = await callVerifyApi(session.email);
    if (result.ok && result.data.status !== 'approved') {
      localStorage.removeItem(VERIFIED_KEY);
      updateLockUI();
      // 가이드 페이지를 보고 있었다면 메인으로 돌려보냄
      const activePage = document.querySelector('.page.active');
      if (activePage && activePage.id !== 'home' && activePage.id !== 'verify') {
        goTo('home');
      }
    }
    // 네트워크 오류 등으로 result.ok가 false인 경우는 무시 (일시적 오류로 로그아웃시키지 않음)
  }
</script>

</body>
</html>
